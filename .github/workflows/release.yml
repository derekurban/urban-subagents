name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          cache: "npm"

      - name: Upgrade npm
        run: npm install --global npm@11.11.1

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack release tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --json | node -e "const fs = require('node:fs'); const output = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(output[0].filename);")"
          echo "TARBALL_NAME=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ${{ env.TARBALL_NAME }}
          if-no-files-found: error

  publish-npm:
    name: Publish To npm
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install --global npm@11.11.1

      - name: Show toolchain versions
        run: |
          node --version
          npm --version

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package

      - name: Publish package
        run: npm publish ./*.tgz --access public

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, publish-npm]
    permissions:
      contents: write

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          generate_release_notes: true
